<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Live!</title>
    <style>
        /* Modern Color Palette and Variables */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        /* Header Styling */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        /* Main App Container */
        .container {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        /* Input Form Styling */
        .add-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .add-form input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .add-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .add-form button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .add-form button:hover {
            background-color: var(--primary-hover);
        }
        
        .add-form button:active {
            transform: scale(0.98);
        }

        /* Task List Styling */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            background-color: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-color: #D1D5DB;
        }

        .task-name {
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
            color: var(--text);
        }

        /* Delete Button Styling */
        .delete-link {
            background-color: transparent;
            color: var(--danger);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--danger);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .delete-link:hover {
            background-color: var(--danger);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
            font-size: 1.1rem;
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Task Tracker Live!</h1>
        <p>Managed by Kubernetes • Monitored by Nagios</p>
    </div>

    <div class="container">
        <form action="/add" method="POST" class="add-form">
            <input type="text" name="task" id="taskInput" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" id="addButton">Add Task</button>
        </form>

        <ul id="taskList" class="task-list">
            {% if tasks %}
                {% for task in tasks %}
                    <li class="task-item">
                        <span class="task-name">{{ task[1] }}</span> 
                        <a href="/delete/{{ task[0] }}" class="delete-link">Delete</a>
                    </li>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    🎉 All caught up! Add a new task above.
                </div>
            {% endif %}
        </ul>
    </div>

    <div class="footer">
        Automated CI/CD Pipeline Lab
    </div>
</body>
</html>
