apiVersion: v1
kind: PersistentVolume
metadata:
  name: task-tracker-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/task-tracker" # Saves data to the Minikube VM's hard drive
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: task-tracker-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
