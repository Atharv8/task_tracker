apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-tracker-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-tracker
  template:
    metadata:
      labels:
        app: task-tracker
    spec:
      containers:
      - name: task-tracker
        image: task-tracker:latest
        imagePullPolicy: Never # Crucial for Minikube local images
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: sqlite-storage
          mountPath: /data # Matches the ENV variable in the Dockerfile
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: task-tracker-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: task-tracker-service
spec:
  type: NodePort
  selector:
    app: task-tracker
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30005
